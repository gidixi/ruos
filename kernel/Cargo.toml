[package]
name = "kernel"
version = "0.1.0"
edition = "2021"
build = "build.rs"

[dependencies]
limine = "0.6"
uart_16550 = "0.3"
talc = "4"
spin = "0.9"
x86_64 = "0.15"
acpi = "5"
bitflags = "2"
noto-sans-mono-bitmap = "0.3"
vte = { version = "0.13", default-features = false, features = ["no_std"] }
embassy-executor = { version = "0.6", default-features = false, features = ["nightly", "task-arena-size-65536"] }
wasmi = { version = "1.0.9", default-features = false, features = ["prefer-btree-collections"] }
smoltcp = { version = "0.11", default-features = false, features = ["alloc", "medium-ip", "proto-ipv4", "socket-tcp"] }
pci_types = "0.10"

[features]
boot-checks = []
wasm-trace = []

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
