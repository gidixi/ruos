timeout: 0

/ruos
    protocol: limine
    path: boot():/boot/kernel
    stack_size: 0x1000000
    module_path: boot():/init.wasm
    module_cmdline: /init.wasm
    module_path: boot():/etc/init.sh
    module_cmdline: /etc/init.sh
    # Live-CD fallback set: the boot-critical CLI shell (`shell.wasm`, auto-
    # spawned by the executor on the console + SSH — see disk.rs BOOTSTRAP) is
    # loaded into RAM (tmpfs /bin) so the system reaches a usable shell even if
    # the off-boot /bin overlay fails (e.g. USB Mass-Storage unsupported on some
    # real hardware). When a removable medium is present, the ISO9660 overlay
    # (boot phase `media_bin`) shadows /bin with the full tool + app set; the rest
    # stays off-boot on the ISO filesystem (read on-demand).
    module_path: boot():/bin/shell.wasm
    module_cmdline: /bin/shell.wasm
    # Rescue tool set: small CLI tools loaded into RAM so the system is
    # INSPECTABLE even when the off-boot /bin overlay fails (e.g. USB-MSC not
    # reachable). `dmesg` is the key one — it dumps the kernel log (USB
    # controller list, port table, mount failures) straight from the shell, no
    # serial/boot photo needed. The big app `.cwasm` stay off-boot.
    module_path: boot():/bin/ls.wasm
    module_cmdline: /bin/ls.wasm
    module_path: boot():/bin/cat.wasm
    module_cmdline: /bin/cat.wasm
    module_path: boot():/bin/echo.wasm
    module_cmdline: /bin/echo.wasm
    module_path: boot():/bin/dmesg.wasm
    module_cmdline: /bin/dmesg.wasm
    module_path: boot():/bin/lspci.wasm
    module_cmdline: /bin/lspci.wasm
    module_path: boot():/bin/lsusb.wasm
    module_cmdline: /bin/lsusb.wasm
    module_path: boot():/bin/ip.wasm
    module_cmdline: /bin/ip.wasm
    module_path: boot():/bin/ifconfig.wasm
    module_cmdline: /bin/ifconfig.wasm
    module_path: boot():/bin/ping.wasm
    module_cmdline: /bin/ping.wasm
    module_path: boot():/bin/uname.wasm
    module_cmdline: /bin/uname.wasm
    module_path: boot():/bin/uptime.wasm
    module_cmdline: /bin/uptime.wasm
    module_path: boot():/bin/free.wasm
    module_cmdline: /bin/free.wasm
    module_path: boot():/bin/df.wasm
    module_cmdline: /bin/df.wasm
    module_path: boot():/bin/ps.wasm
    module_cmdline: /bin/ps.wasm
    module_path: boot():/bin/grep.wasm
    module_cmdline: /bin/grep.wasm
    module_path: boot():/bin/head.wasm
    module_cmdline: /bin/head.wasm
    module_path: boot():/bin/tail.wasm
    module_cmdline: /bin/tail.wasm
    module_path: boot():/bin/wc.wasm
    module_cmdline: /bin/wc.wasm
    module_path: boot():/bin/clear.wasm
    module_cmdline: /bin/clear.wasm
    module_path: boot():/bin/which.wasm
    module_cmdline: /bin/which.wasm
    # Below: /payload/ artifacts (kernel + UEFI bootloader + limine confs) used by
    # the SSD installer; NOT tmpfs-mounted (modules.rs skips the /payload/ prefix).
    # (available diskless). The compositor's launcher still discovers them
    # dynamically via their `manifest()` export (kernel wm.rs scan_apps over /bin,
    # plus the optional /mnt/apps drop folder) — boot-baked here, dynamic at runtime.
    module_path: boot():/boot/kernel
    module_cmdline: /payload/kernel
    module_path: boot():/EFI/BOOT/BOOTX64.EFI
    module_cmdline: /payload/BOOTX64.EFI
    module_path: boot():/boot/limine/limine.conf
    module_cmdline: /payload/limine.conf
    module_path: boot():/boot/limine/limine-ssd.conf
    module_cmdline: /payload/limine-ssd.conf
